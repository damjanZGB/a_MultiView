version: '3.8'

services:
  multiview:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multiview
    restart: unless-stopped
    expose:
      - "5030"
    volumes:
      - multiview_data:/app/instance
    environment:
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:?Set ADMIN_PASS in .env}
    networks:
      - supabase_network_octado

networks:
  supabase_network_octado:
    external: true

volumes:
  multiview_data:
