{% extends "base.html" %}
{% block title %}a_MultiView — Settings{% endblock %}
{% block body_class %}settings-page{% endblock %}

{% block body %}
<div class="settings-container">
    <div class="settings-header">
        <h1>SETTINGS</h1>
        <a href="{{ url_for('views.director') }}" class="bit-btn">BACK TO MONITOR</a>
    </div>

    <!-- Switcher Settings -->
    <div class="settings-section pixel-border">
        <h2>Switcher</h2>
        <div class="settings-row">
            <span class="settings-label">Grid Size</span>
            <div class="settings-value">
                <select id="settGridSize">
                    <option value="2">2 x 2</option>
                    <option value="3">3 x 3</option>
                    <option value="4">4 x 4</option>
                </select>
            </div>
        </div>
        <div class="settings-row">
            <span class="settings-label">Transition Type</span>
            <div class="settings-value">
                <select id="settTransType">
                    <option value="cut">Cut</option>
                    <option value="mix">Mix</option>
                    <option value="dip">Dip</option>
                </select>
            </div>
        </div>
        <div class="settings-row">
            <span class="settings-label">Transition Duration (ms)</span>
            <div class="settings-value">
                <div class="pixel-input pixel-input-sm">
                    <input type="number" id="settTransDuration" min="100" max="5000" step="100" value="500">
                </div>
            </div>
        </div>
        <div style="margin-top: 12px;">
            <button class="bit-btn bit-btn-accent" id="btnSaveSettings">SAVE SETTINGS</button>
        </div>
    </div>

    <!-- Stream Sources -->
    <div class="settings-section pixel-border">
        <h2>Sources</h2>
        <div id="streamList"></div>
        <div style="margin-top: 12px;">
            <button class="bit-btn bit-btn-accent" id="btnAddSource">+ ADD SOURCE</button>
        </div>
    </div>
</div>

<!-- Add Source Dialog -->
<dialog id="settingsAddDialog" class="bit-dialog">
    <div class="pixel-border dialog-inner">
        <form id="settingsAddForm">
            <h3>ADD SOURCE</h3>
            <div class="dialog-field">
                <label for="settAddName">Name</label>
                <div class="pixel-input">
                    <input type="text" id="settAddName" placeholder="CAM 1" required>
                </div>
            </div>
            <div class="dialog-field">
                <label for="settAddUrl">URL</label>
                <div class="pixel-input">
                    <input type="text" id="settAddUrl" placeholder="https://..." required>
                </div>
            </div>
            <div class="dialog-actions">
                <button type="submit" class="bit-btn bit-btn-accent">ADD</button>
                <button type="button" class="bit-btn" id="settAddCancel">CANCEL</button>
            </div>
        </form>
    </div>
</dialog>

<script>
    function _csrfToken() {
        const m = document.querySelector('meta[name="csrf-token"]');
        return m ? m.getAttribute('content') : '';
    }
    const API = (path, method = 'GET', body = null) => {
        const opts = { method, headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrfToken() } };
        if (body) opts.body = JSON.stringify(body);
        return fetch(`/api${path}`, opts).then(r => r.json());
    };

    async function init() {
        const settings = await API('/switcher/settings');
        document.getElementById('settGridSize').value = settings.grid_size;
        document.getElementById('settTransType').value = settings.transition_type;
        document.getElementById('settTransDuration').value = settings.transition_duration;
        await renderStreams();
    }

    async function renderStreams() {
        const data = await API('/streams');
        const list = document.getElementById('streamList');
        list.innerHTML = '';

        if (!data.streams?.length) {
            list.innerHTML = '<div class="empty-msg">No sources configured</div>';
            return;
        }

        data.streams.forEach(s => {
            const item = document.createElement('div');
            item.className = 'stream-list-item pixel-border-thin';
            item.innerHTML = `
                <div class="stream-info">
                    <div class="stream-name">${esc(s.name)}</div>
                    <div class="stream-url">${esc(s.url)}</div>
                </div>
                <div class="stream-actions">
                    <button class="bit-btn bit-btn-sm bit-btn-danger" data-id="${s.id}" data-action="delete">DELETE</button>
                </div>
            `;
            item.querySelector('[data-action="delete"]').addEventListener('click', async () => {
                if (confirm(`Delete "${s.name}"?`)) {
                    await API(`/streams/${s.id}`, 'DELETE');
                    await renderStreams();
                }
            });
            list.appendChild(item);
        });
    }

    document.getElementById('btnSaveSettings').addEventListener('click', async () => {
        await API('/switcher/settings', 'PUT', {
            grid_size: parseInt(document.getElementById('settGridSize').value),
            transition_type: document.getElementById('settTransType').value,
            transition_duration: parseInt(document.getElementById('settTransDuration').value),
        });
        alert('Settings saved');
    });

    document.getElementById('btnAddSource').addEventListener('click', () => {
        document.getElementById('settingsAddDialog').showModal();
    });
    document.getElementById('settAddCancel').addEventListener('click', () => {
        document.getElementById('settingsAddDialog').close();
    });
    document.getElementById('settingsAddForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('settAddName').value.trim();
        const url = document.getElementById('settAddUrl').value.trim();
        if (!name || !url) return;
        await API('/streams', 'POST', { name, url });
        document.getElementById('settingsAddDialog').close();
        document.getElementById('settAddName').value = '';
        document.getElementById('settAddUrl').value = '';
        await renderStreams();
    });

    function esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    init();
</script>
{% endblock %}
